openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: rag
    description: PDF RAG operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /rag/documents:
    get:
      operationId: listDocuments
      tags: [rag]
      summary: List all uploaded documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RagDocument"
    post:
      operationId: uploadDocument
      tags: [rag]
      summary: Upload a PDF document (multipart/form-data handled server-side)
      responses:
        "201":
          description: Document uploaded and processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagDocument"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /rag/documents/{id}:
    get:
      operationId: getDocument
      tags: [rag]
      summary: Get a document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagDocument"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteDocument
      tags: [rag]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /rag/documents/{id}/query:
    post:
      operationId: queryDocument
      tags: [rag]
      summary: Ask a question about a document (SSE streaming)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RagQuery"
      responses:
        "200":
          description: Streamed answer (SSE)
          content:
            text/event-stream:
              schema:
                type: string

  /rag/documents/{id}/conversations:
    get:
      operationId: getConversationHistory
      tags: [rag]
      summary: Get conversation history for a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RagDocument:
      type: object
      properties:
        id:
          type: integer
        filename:
          type: string
        originalName:
          type: string
        pageCount:
          type: ["integer", "null"]
        chunkCount:
          type: integer
        status:
          type: string
          enum: [processing, ready, error]
        createdAt:
          type: string
      required:
        - id
        - filename
        - originalName
        - chunkCount
        - status
        - createdAt

    RagQuery:
      type: object
      properties:
        question:
          type: string
          minLength: 1
      required:
        - question

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        documentId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        sources:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - documentId
        - role
        - content
        - createdAt

    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
